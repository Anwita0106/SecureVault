version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: securevault_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: securevault
      POSTGRES_USER: securevault
      POSTGRES_PASSWORD: securevault_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securevault"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - securevault_net

  # Redis (for caching / sessions)
  redis:
    image: redis:7-alpine
    container_name: securevault_redis
    restart: unless-stopped
    command: redis-server --requirepass securevault_redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - securevault_net

  # ClamAV Malware Scanner
  clamav:
    image: clamav/clamav:stable
    container_name: securevault_clamav
    restart: unless-stopped
    volumes:
      - clamav_data:/var/lib/clamav
    ports:
      - "3310:3310"
    healthcheck:
      test: ["CMD", "clamdscan", "--version"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s
    networks:
      - securevault_net

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: securevault_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://securevault:securevault_pass@db:5432/securevault
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-super-secret-jwt-key-change-in-production-32chars}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-super-secret-encryption-key-change-32c}
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production-min32}
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /app/storage/files
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      CLAMAV_ENABLED: "false"
      REDIS_URL: redis://:securevault_redis@redis:6379/0
      ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:80","http://localhost"]'
      DEBUG: "false"
      FIRST_ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@securevault.local}
      FIRST_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@SecureVault2024!}
    volumes:
      - file_storage:/app/storage/files
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - securevault_net

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: securevault_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - securevault_net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  clamav_data:
    driver: local
  file_storage:
    driver: local

networks:
  securevault_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
